<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LibraSync — Library Management System</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="login-page">

    <div class="login-container">
        <!-- Left Panel -->
        <div class="login-left">
            <div class="brand">
                <div class="brand-icon">📚</div>
                <h1 class="brand-name">LibraSync</h1>
                <p class="brand-tagline">Smart Library Management</p>
            </div>
            <div class="feature-list">
                <div class="feature-item"><span class="feat-icon">📖</span> Manage Books & Inventory</div>
                <div class="feature-item"><span class="feat-icon">👥</span> Member Registration</div>
                <div class="feature-item"><span class="feat-icon">🔄</span> Issue & Return Tracking</div>
                <div class="feature-item"><span class="feat-icon">⚠️</span> Fine Calculation</div>
                <div class="feature-item"><span class="feat-icon">🔍</span> Advanced Search</div>
            </div>
            <div class="deco-circles">
                <div class="circle c1"></div>
                <div class="circle c2"></div>
                <div class="circle c3"></div>
            </div>
        </div>

        <!-- Right Panel -->
        <div class="login-right">
            <div class="login-form-wrap">
                <h2>Welcome Back</h2>
                <p class="sub">Sign in to your library account</p>

                <div id="loginError" class="alert alert-error" style="display:none"></div>

                <form id="loginForm">
                    <div class="form-group">
                        <label>Email Address</label>
                        <div class="input-wrap">
                            <span class="input-icon">✉️</span>
                            <input type="email" id="email" placeholder="admin@library.com" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <div class="input-wrap">
                            <span class="input-icon">🔒</span>
                            <input type="password" id="password" placeholder="Enter password" required>
                            <span class="toggle-pwd" onclick="togglePwd()">👁</span>
                        </div>
                    </div>
                    <button type="submit" class="btn-login" id="loginBtn">
                        <span id="btnText">Sign In</span>
                        <span id="btnLoader" style="display:none">⏳ Signing in...</span>
                    </button>
                </form>

                <div class="demo-creds">
                    <p><strong>Demo Credentials</strong></p>
                    <div class="cred-boxes">
                        <div class="cred-box" onclick="fillAdmin()">
                            <span class="cred-badge admin">ADMIN</span>
                            <small>admin@library.com</small>
                            <small>admin123</small>
                        </div>
                        <div class="cred-box" onclick="fillMember()">
                            <span class="cred-badge member">MEMBER</span>
                            <small>rahul@example.com</small>
                            <small>member123</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function togglePwd() {
            const p = document.getElementById('password');
            p.type = p.type === 'password' ? 'text' : 'password';
        }
        function fillAdmin() {
            document.getElementById('email').value = 'admin@library.com';
            document.getElementById('password').value = 'admin123';
        }
        function fillMember() {
            document.getElementById('email').value = 'rahul@example.com';
            document.getElementById('password').value = 'member123';
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const btnText = document.getElementById('btnText');
            const btnLoader = document.getElementById('btnLoader');
            btnText.style.display = 'none';
            btnLoader.style.display = 'inline';
            btn.disabled = true;

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            fetch('LoginServlet', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    window.location.href = data.role === 'ADMIN' ? 'dashboard.html' : 'member-dashboard.html';
                } else {
                    document.getElementById('loginError').textContent = data.message || 'Invalid credentials';
                    document.getElementById('loginError').style.display = 'block';
                    btnText.style.display = 'inline';
                    btnLoader.style.display = 'none';
                    btn.disabled = false;
                }
            })
            .catch(() => {
                // For demo without backend, simulate login
                if (email === 'admin@library.com' && password === 'admin123') {
                    window.location.href = 'dashboard.html';
                } else if (email === 'rahul@example.com' && password === 'member123') {
                    window.location.href = 'member-dashboard.html';
                } else {
                    document.getElementById('loginError').textContent = 'Invalid email or password!';
                    document.getElementById('loginError').style.display = 'block';
                    btnText.style.display = 'inline';
                    btnLoader.style.display = 'none';
                    btn.disabled = false;
                }
            });
        });
    </script>
</body>
</html>
